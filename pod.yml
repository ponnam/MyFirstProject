apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deploy
  labels:
    env: demo
spec:
  replicas: 3
  selector:
    matchLabels: 
      app: demo
  template:
    metadata:
      labels:
        app: demo
        location: hyd
        team: sales

    spec:
      containers:
      - name: demo
        image: nginx

